version: "3.8"
 
services:
 
  app:
    build: .
    image: springboot-docker-app
    ports:
      - "8080:8080"
 
    depends_on:
      - postgres
 
    networks:
      - s-network
 
  postgres:
    image: postgres:16
 
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
 
    ports:
      - "5433:5432"
 
    volumes:
      - postgres-data:/var/lib/postgresql/data
 
    networks:
      - s-network
 
networks:
  s-network:
    driver: bridge
volumes:
  postgres-data: 